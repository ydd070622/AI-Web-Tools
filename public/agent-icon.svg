<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#4d6bfe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- outer hexagon -->
  <polygon points="64,6 118,38 118,90 64,122 10,90 10,38" fill="none" stroke="url(#lg)" stroke-width="3" filter="url(#glow)" opacity="0.9"/>
  <!-- inner hexagon -->
  <polygon points="64,22 104,46 104,82 64,106 24,82 24,46" fill="url(#lg)" opacity="0.15" stroke="url(#lg)" stroke-width="1.5"/>
  <!-- center L -->
  <text x="64" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="48" fill="url(#lg)" filter="url(#glow)">L</text>
  <!-- sparkle dots -->
  <circle cx="64" cy="112" r="3" fill="#4d6bfe" opacity="0.6"/>
</svg>