name: Sync to Gitee

on:
  push:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to sync release for (e.g. v3.2.9)'
        required: true
        type: string

jobs:
  sync-code:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          git remote add gitee https://ydd070622:${{ secrets.GITEE_TOKEN }}@gitee.com/ydd070622/ai-web-tools.git
          git push gitee master --force

  sync-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Determine release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Fetch release info from GitHub
        run: |
          echo "Fetching release info for tag: $TAG"
          RELEASE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          echo "$RELEASE" > release.json
          python3 -c "import json; r=json.load(open('release.json')); print(f'Release: {r.get(\"name\",\"\")}, assets: {len(r.get(\"assets\",[]))}')"

      - name: Download GitHub release assets
        run: |
          python3 -c "
          import json, os
          r = json.load(open('release.json'))
          assets = r.get('assets', [])
          for a in assets:
              name = a['name']
              url = a['browser_download_url']
              print(f'Downloading: {name}')
              os.system(f'curl -sSL -o \"{name}\" \"{url}\"')
          print(f'Downloaded {len(assets)} assets')
          "

      - name: Get or Create Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess
          r = json.load(open('release.json'))
          tag = r['tag_name']
          name = r.get('name', tag)
          body = r.get('body', '')
          target = r.get('target_commitish', 'master')
          token = os.environ['GITEE_TOKEN']

          # 1. Try to find existing release by tag
          resp = subprocess.check_output(['curl', '-s',
              f'https://gitee.com/api/v5/repos/ydd070622/ai-web-tools/releases/tags/{tag}?access_token={token}']).decode()
          data = json.loads(resp)
          release_id = data.get('id', 0)

          if release_id:
              print(f'Found existing release id: {release_id}')
              # Delete old non-auto assets
              for asset in data.get('assets', []):
                  asset_id = asset.get('id')
                  if not asset_id: continue
                  aname = asset.get('name', '')
                  if aname.endswith('.zip') or aname.endswith('.tar.gz'):
                      print(f'Skip auto-generated: {aname}')
                      continue
                  print(f'Deleting old asset: {aname}')
                  try:
                      subprocess.check_output(['curl', '-s', '-X', 'DELETE',
                          f'https://gitee.com/api/v5/repos/ydd070622/ai-web-tools/releases/{release_id}/attach_files/{asset_id}?access_token={token}']).decode()
                  except Exception as e:
                      print(f'Delete failed (non-fatal): {e}')
          else:
              # 2. Create new release
              payload = json.dumps({
                  'access_token': token,
                  'tag_name': tag,
                  'name': name,
                  'body': body,
                  'target_commitish': target,
                  'prerelease': False
              })
              resp = subprocess.check_output(['curl', '-s', '-X', 'POST',
                  'https://gitee.com/api/v5/repos/ydd070622/ai-web-tools/releases',
                  '-H', 'Content-Type: application/json',
                  '-d', payload]).decode()
              print(f'Create release response: {resp}')
              data = json.loads(resp)
              if 'id' not in data:
                  print(f'ERROR: Failed to create release: {data}')
                  exit(1)
              release_id = data['id']
              print(f'Created release id: {release_id}')

          with open(os.environ['GITHUB_ENV'], 'a') as env:
              env.write(f'RELEASE_ID={release_id}\n')
          PYEOF

      - name: Upload assets to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess
          r = json.load(open('release.json'))
          token = os.environ['GITEE_TOKEN']
          release_id = os.environ['RELEASE_ID']

          assets = r.get('assets', [])
          for a in assets:
              name = a['name']
              if not os.path.exists(name):
                  print(f'File not found: {name}, skipping')
                  continue
              print(f'Uploading: {name}')
              try:
                  resp = subprocess.check_output(['curl', '-s', '-X', 'POST',
                      f'https://gitee.com/api/v5/repos/ydd070622/ai-web-tools/releases/{release_id}/attach_files',
                      '-F', f'access_token={token}',
                      '-F', f'file=@{name}']).decode()
                  print(f'Upload response: {resp}')
              except Exception as e:
                  print(f'Upload failed for {name}: {e}')
          PYEOF
