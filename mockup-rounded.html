<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>圆角窗口模拟 - AI Web Tools</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #222; 
  display: flex; align-items: center; justify-content: center; 
  min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

/* 模拟桌面背景 */
.desktop {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
}

/* 圆角窗口 */ 
.window {
  width: 1100px; height: 680px;
  background: #0a0a0f;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 24px 64px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
}

/* 自定义标题栏 - 极简 */
.titlebar {
  height: 32px;
  background: #0a0a0f;
  display: flex; align-items: center;
  flex-shrink: 0;
  user-select: none;
  -webkit-app-region: drag;
}
.titlebar-label {
  font-size: 11px; color: #555; margin-left: 12px;
}
.titlebar-spacer { flex: 1; }
.titlebar-btn {
  width: 36px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #666; cursor: pointer;
  -webkit-app-region: no-drag;
  border-radius: 4px;
  margin-right: 2px;
}
.titlebar-btn:hover { background: rgba(255,255,255,0.06); color: #ccc; }
.titlebar-btn.close:hover { background: #e81123; color: #fff; }

/* 内容区 */
.app { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 56px; background: #0d0d14; border-right: 1px solid #1a1a2e; display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 6px; flex-shrink: 0; }
.sidebar-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; color: #888; }
.sidebar-icon:hover { background: rgba(255,255,255,0.06); color: #ccc; }
.sidebar-icon.active { background: rgba(99,102,241,0.15); color: #818cf8; }
.sidebar-divider { width: 28px; height: 1px; background: #1a1a2e; margin: 2px 0; }
.sidebar-spacer { flex: 1; }

.main { flex: 1; display: flex; flex-direction: column; }
.tab-bar { height: 32px; background: #0d0d14; border-bottom: 1px solid #1a1a2e; display: flex; align-items: center; padding: 0 4px; }
.nav-btns { display: flex; border-right: 1px solid #1a1a2e; padding: 0 2px; }
.nav-btn { width: 24px; height: 26px; display: flex; align-items: center; justify-content: center; color: #666; border-radius: 4px; cursor: pointer; font-size: 12px; }
.tab-item { height: 26px; padding: 0 8px; background: rgba(255,255,255,0.02); border-radius: 6px 6px 0 0; margin: 0 1px; display: flex; align-items: center; font-size: 11px; color: #888; cursor: pointer; }
.tab-item.active { background: #0a0a0f; color: #e0e0e0; border: 1px solid #2a2a3e; border-bottom-color: #0a0a0f; }
.tab-close { margin-left: 4px; opacity: 0.3; }
.content { flex: 1; display: flex; align-items: center; justify-content: center; background: #06060a; }
.hint { color: #1a1a1a; font-size: 13px; }

/* 圆角对比说明 */
.compare { margin-top: 16px; display: flex; gap: 24px; }
.compare-item { text-align: center; }
.compare-item span { font-size: 12px; color: #888; display: block; margin-top: 6px; }
.compare-box { width: 80px; height: 80px; }
.compare-box.old { background: #0a0a0f; border: 3px solid #ef4444; }
.compare-box.new { background: #0a0a0f; border: 3px solid #10b981; border-radius: 12px; }
</style>
</head>
<body>
<div class="desktop">
  <div class="window">
    <!-- 自定义标题栏 -->
    <div class="titlebar">
      <span class="titlebar-label">AI Web Tools</span>
      <span class="titlebar-spacer"></span>
      <div class="titlebar-btn" title="最小化">─</div>
      <div class="titlebar-btn" title="最大化">☐</div>
      <div class="titlebar-btn close" title="关闭">✕</div>
    </div>

    <!-- 原有内容 -->
    <div class="app">
      <div class="sidebar">
        <div class="sidebar-icon active">🏠</div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-icon">🎨</div>
        <div class="sidebar-icon">🤖</div>
        <div class="sidebar-icon">📚</div>
        <div class="sidebar-icon">💬</div>
        <div class="sidebar-icon">🔮</div>
        <div class="sidebar-icon">✨</div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-icon">🖼️</div>
        <div class="sidebar-icon">🔄</div>
        <div class="sidebar-icon">📋</div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-icon">📦</div>
        <div class="sidebar-icon">💳</div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-icon">👤</div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-icon">🔗</div>
        <div class="sidebar-icon">🌐</div>
        <div class="sidebar-spacer"></div>
        <div class="sidebar-icon">⬇</div>
        <div class="sidebar-icon">🌙</div>
        <div class="sidebar-icon">⚙️</div>
      </div>
      <div class="main">
        <div class="tab-bar">
          <div class="nav-btns">
            <div class="nav-btn">←</div>
            <div class="nav-btn">→</div>
          </div>
          <div class="tab-item active">DeepSeek 开放平台 <span class="tab-close">×</span></div>
          <div class="tab-item">智谱AI Open <span class="tab-close">×</span></div>
          <div style="flex:1"></div>
        </div>
        <div class="content"><div class="hint">[ WebView 内容区域 ]</div></div>
      </div>
    </div>
  </div>

  <div class="compare">
    <div class="compare-item">
      <div class="compare-box old"></div>
      <span>现在（直角）</span>
    </div>
    <div class="compare-item">
      <div class="compare-box new"></div>
      <span>改后（圆角 12px）</span>
    </div>
  </div>
</div>
</body>
</html>
