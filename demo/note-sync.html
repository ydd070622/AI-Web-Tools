<!DOCTYPE html>
<html lang="zh-CN" class="theme-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LingWorks · 小红书笔记同步</title>
<style>
  :root {
    --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-tertiary: #1a1a24;
    --bg-card: #16161f; --text-primary: #e8e8ed; --text-secondary: #9d9db0;
    --text-muted: #6b6b80; --accent: #6366f1; --accent-hover: #818cf8;
    --radius: 10px; --radius-sm: 6px; --border: #1e1e2e;
    --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
    --transition: 0.2s ease;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-primary); color: var(--text-primary);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    -webkit-font-smoothing: antialiased; padding: 20px;
  }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

  .container {
    width: 100%; max-width: 780px; display: flex; flex-direction: column; gap: 16px;
  }

  /* ---- Card ---- */
  .card {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 20px; border-bottom: 1px solid var(--border);
  }
  .card-header .logo {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--accent); display: flex; align-items: center;
    justify-content: center; color: #fff; font-size: 12px; font-weight: 700;
  }
  .card-header h1 { font-size: 14px; font-weight: 700; }
  .card-body { padding: 20px; }

  /* ---- Link Input ---- */
  .link-input-row {
    display: flex; gap: 10px; margin-bottom: 12px;
  }
  .link-input-row input {
    flex: 1; padding: 10px 14px; border-radius: 8px;
    border: 1.5px solid var(--border); background: var(--bg-primary);
    color: var(--text-primary); font-size: 13px; font-family: inherit; outline: none;
    transition: all var(--transition);
  }
  .link-input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
  .link-input-row input::placeholder { color: var(--text-muted); }

  .btn {
    padding: 10px 18px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: all var(--transition); white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-success { background: var(--success); color: #000; }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1.5px solid var(--border); }
  .btn-ghost:hover { color: var(--text-primary); border-color: var(--text-muted); }
  .btn-xs { padding: 5px 10px; font-size: 10px; border-radius: 5px; }

  .hint { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; line-height: 1.6; }
  .hint em { color: var(--accent); font-style: normal; }

  /* ---- 4-Field Form ---- */
  .form-grid {
    display: grid; grid-template-columns: 1fr 120px 130px 120px; gap: 10px;
    align-items: flex-end; padding: 14px 16px;
    background: var(--bg-card); border-radius: var(--radius);
    border: 1px solid var(--border); margin-bottom: 12px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label {
    font-size: 10px; color: var(--text-muted); font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .field input, .field select {
    padding: 8px 12px; border-radius: 6px; border: 1.5px solid var(--border);
    background: var(--bg-primary); color: var(--text-primary);
    font-size: 13px; font-family: inherit; outline: none;
    transition: all var(--transition); width: 100%;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 2px rgba(99,102,241,0.1);
  }
  .field .required { color: var(--danger); }

  /* ---- Added Toast ---- */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--success); color: #000; padding: 10px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 1.5s forwards;
    z-index: 999;
  }
  @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(-10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  @keyframes toastOut { from { opacity:1; } to { opacity:0; } }

  /* ---- Notes Table ---- */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    text-align: left; padding: 7px 12px; font-size: 10px;
    color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .title-col { font-weight: 500; color: var(--text-primary); max-width: 280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .link-col { max-width: 140px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .link-col a { color: var(--accent); text-decoration: none; font-size: 11px; }
  .link-col a:hover { text-decoration: underline; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600;
  }
  .badge-pub { background: rgba(34,197,94,0.12); color: var(--success); }
  .badge-draft { background: rgba(156,163,175,0.10); color: var(--text-muted); }
  .badge-new { background: rgba(99,102,241,0.15); color: var(--accent); margin-left: 6px; }
  .highlight-row { background: rgba(99,102,241,0.04); }
  .highlight-row td:first-child { border-left: 2px solid var(--accent); padding-left: 10px; }
  .counter { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }

  .empty-row td { text-align: center; padding: 28px; color: var(--text-muted); }
  .icon-mono { font-size: 15px; }
</style>
</head>
<body>

<div class="container">
  <!-- Sync Panel -->
  <div class="card" id="syncCard">
    <div class="card-header">
      <div class="logo">L</div>
      <h1>小红书笔记同步</h1>
    </div>
    <div class="card-body">
      <div class="link-input-row">
        <input type="text" id="linkInput"
          placeholder="粘贴小红书笔记链接 https://www.xiaohongshu.com/explore/..."
          autocomplete="off" />
        <button class="btn btn-primary" onclick="showForm()" id="parseBtn">
          📎 粘贴链接
        </button>
      </div>
      <div class="hint">
        粘贴链接后填写 <em>4 个字段</em>：标题、账号、发布时间、状态 → 一键入库
      </div>

      <!-- 4-Field Form (hidden initially) -->
      <div id="formArea"></div>
    </div>
  </div>

  <!-- Notes List -->
  <div class="card">
    <div class="card-header">
      <h1>📋 笔记管理</h1>
      <span class="counter" id="noteCount" style="margin-left:auto">0 条笔记</span>
    </div>
    <div class="card-body" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>笔记标题</th><th style="width:80px">账号</th>
              <th style="width:90px">发布日期</th><th style="width:70px">状态</th>
              <th style="width:160px">链接</th>
            </tr>
          </thead>
          <tbody id="notesBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== State ====================
const accounts = ['主账号', '小号A', '小号B']
let notes = [
  { id:'n1', title:'奶油风客厅改造实录，附软装清单', publishDate:'2026-06-08', status:'published', account:'主账号', link:'https://www.xiaohongshu.com/explore/abc123' },
  { id:'n2', title:'89平小三居，这样装显大20平', publishDate:'2026-06-02', status:'published', account:'主账号', link:'' },
  { id:'n3', title:'法式复古卧室，每个角落都是电影感', publishDate:'2026-05-28', status:'published', account:'小号A', link:'' },
  { id:'n4', title:'精装房改造避坑指南', publishDate:'', status:'draft', account:'主账号', link:'' },
]
let lastAddedId = null

// ==================== Render ====================
function fmtDate(d) {
  if (!d) return '—'
  const p = d.split('-')
  return parseInt(p[1])+'月'+parseInt(p[2])+'日'
}

function renderTable() {
  const tbody = document.getElementById('notesBody')
  const countEl = document.getElementById('noteCount')
  countEl.textContent = notes.length + ' 条笔记 · ' + notes.filter(n=>n.status==='published').length + ' 已发布'
  if (notes.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">暂无笔记，粘贴链接开始同步</td></tr>'
    return
  }
  tbody.innerHTML = notes.map((n, i) => `
    <tr class="${n.id === lastAddedId ? 'highlight-row' : ''}">
      <td class="title-col">
        ${n.title}
        ${n.id === lastAddedId ? '<span class="badge badge-new">新</span>' : ''}
      </td>
      <td style="font-size:11px">${n.account}</td>
      <td style="font-size:11px">${fmtDate(n.publishDate)}</td>
      <td><span class="badge ${n.status==='published'?'badge-pub':'badge-draft'}">${n.status==='published'?'已发布':'草稿'}</span></td>
      <td class="link-col">${n.link ? `<a href="${n.link}" target="_blank" title="${n.link}">🔗 ${n.link.slice(0,30)}…</a>` : '<span style="color:var(--text-muted);font-size:10px">—</span>'}</td>
    </tr>
  `).join('')
}

function showToast(msg) {
  const t = document.createElement('div')
  t.className = 'toast'; t.textContent = msg
  document.body.appendChild(t)
  setTimeout(() => t.remove(), 2000)
}

// ==================== Form Logic ====================
function showForm() {
  const link = document.getElementById('linkInput').value.trim()
  if (!link) return

  const area = document.getElementById('formArea')
  area.innerHTML = `
    <div class="form-grid">
      <div class="field">
        <label><span class="required">*</span> 笔记标题</label>
        <input type="text" id="fTitle" placeholder="输入笔记标题" autofocus>
      </div>
      <div class="field">
        <label>归属账号</label>
        <select id="fAccount">
          ${accounts.map(a => `<option value="${a}">${a}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>发布时间</label>
        <input type="date" id="fDate" value="${new Date().toISOString().split('T')[0]}">
      </div>
      <div class="field">
        <label>发布状态</label>
        <select id="fStatus">
          <option value="published">已发布</option>
          <option value="draft">草稿</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="cancelForm()">取消</button>
      <button class="btn btn-success" onclick="addNote()">✅ 确认添加到笔记管理</button>
    </div>`

  document.getElementById('fTitle').focus()
  document.getElementById('parseBtn').textContent = '📝 已粘贴'
}

function cancelForm() {
  document.getElementById('formArea').innerHTML = ''
  document.getElementById('parseBtn').textContent = '📎 粘贴链接'
}

function addNote() {
  const title = document.getElementById('fTitle').value.trim()
  const account = document.getElementById('fAccount').value
  const publishDate = document.getElementById('fDate').value
  const status = document.getElementById('fStatus').value
  const link = document.getElementById('linkInput').value.trim()

  if (!title) {
    document.getElementById('fTitle').style.borderColor = 'var(--danger)'
    document.getElementById('fTitle').focus()
    setTimeout(() => { document.getElementById('fTitle').style.borderColor = '' }, 2000)
    return
  }

  const newNote = { id: 'n'+Date.now(), title, publishDate, status, account, link }
  notes.unshift(newNote)
  lastAddedId = newNote.id

  cancelForm()
  document.getElementById('linkInput').value = ''
  renderTable()
  showToast('✅ 笔记「' + title.slice(0,20) + '」已添加到笔记管理')
}

// ==================== Init ====================
document.getElementById('linkInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') showForm()
})

// Pre-fill with the user's real link for demo
document.getElementById('linkInput').value = 'https://www.xiaohongshu.com/discovery/item/6a3020e80000000021019e05?source=webshare&xhsshare=pc_web'

renderTable()
</script>
</body>
</html>
