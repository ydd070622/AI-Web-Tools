<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书工作台 - 侧栏改版 V2</title>
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-sidebar: #0c0e14;
    --bg-hover: rgba(255,255,255,0.05);
    --bg-active: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.07);
    --text: #e4e4e9;
    --text-secondary: rgba(255,255,255,0.45);
    --text-muted: rgba(255,255,255,0.25);
    --accent: #818cf8;
    --green: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg-primary);
    color: var(--text);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 20px; gap: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .demo-group {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .demo-label {
    font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em;
  }

  .sidebar {
    width: 200px;
    background: var(--bg-sidebar);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  .sidebar-nav {
    flex: 1; overflow-y: auto;
    padding: 8px 0;
  }

  /* =============================================
     VERSION A — 方案 A：极简文字
     ============================================= */
  .v-a .section {
    padding: 10px 14px 6px;
  }
  .v-a .section-header {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; user-select: none;
    padding: 6px 0;
    color: var(--text-secondary);
    transition: color 0.15s;
  }
  .v-a .section-header:hover { color: var(--text); }
  .v-a .section-title {
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.02em;
  }
  .v-a .section-count {
    font-size: 10px; color: var(--text-muted);
    margin-left: auto; margin-right: 4px;
  }
  .v-a .section-chevron {
    transition: transform 0.25s; color: var(--text-muted);
  }
  .v-a .section-chevron.collapsed { transform: rotate(-90deg); }

  .v-a .account-list { padding: 4px 0 2px; display: flex; flex-direction: column; gap: 1px; }
  .v-a .account-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 0;
    cursor: pointer; transition: background 0.15s;
    color: var(--text-secondary); font-size: 12px;
    border-left: 2px solid transparent;
  }
  .v-a .account-item:hover { background: var(--bg-hover); color: var(--text); }
  .v-a .account-item.active {
    background: var(--bg-active); color: var(--text);
    border-left-color: var(--accent);
  }
  .v-a .account-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .v-a .account-dot.online { background: var(--green); }
  .v-a .account-dot.offline { background: rgba(255,255,255,0.15); }
  .v-a .account-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .v-a .footer {
    padding: 8px 10px; border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 3px;
  }
  .v-a .footer button {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 6px 10px; border-radius: 6px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 11px;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .v-a .footer button:hover {
    background: var(--bg-hover); color: var(--text);
  }

  /* =============================================
     VERSION B — 方案 B：卡片式克制的
     ============================================= */
  .v-b .section {
    padding: 6px 10px 2px;
  }
  .v-b .section-header {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; user-select: none;
    padding: 10px 6px 6px;
    color: var(--text-secondary);
    transition: color 0.15s;
  }
  .v-b .section-header:hover { color: var(--text); }
  .v-b .section-title { font-size: 12px; font-weight: 700; }
  .v-b .section-count {
    font-size: 10px; color: var(--text-muted);
    margin-left: auto; margin-right: 2px;
  }
  .v-b .section-chevron {
    transition: transform 0.25s; color: var(--text-muted);
  }
  .v-b .section-chevron.collapsed { transform: rotate(-90deg); }

  .v-b .account-list { padding: 0 8px 4px; display: flex; flex-direction: column; gap: 3px; }
  .v-b .account-card {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 6px;
    cursor: pointer; transition: all 0.15s;
    color: var(--text-secondary); font-size: 12px;
  }
  .v-b .account-card:hover { background: var(--bg-hover); color: var(--text); }
  .v-b .account-card.active { background: var(--bg-active); color: var(--text); }
  .v-b .account-avatar {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    color: #fff; opacity: 0.85;
  }
  .v-b .account-info { flex: 1; min-width: 0; }
  .v-b .account-info-name {
    font-size: 12px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .v-b .account-info-meta {
    font-size: 10px; color: var(--text-muted); margin-top: 1px;
  }

  .v-b .footer {
    padding: 6px 10px; border-top: 1px solid var(--border);
    display: flex; gap: 4px;
  }
  .v-b .footer button {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 7px 0; border-radius: 6px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 11px;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .v-b .footer button:hover { background: var(--bg-hover); color: var(--text); }
  .v-b .footer button.primary { background: rgba(129,140,248,0.15); color: var(--accent); border-color: transparent; }
  .v-b .footer button.primary:hover { background: rgba(129,140,248,0.25); }

  /* =============================================
     VERSION C — 方案 C：带分割线的分组
     ============================================= */
  .v-c .section {
    padding: 0;
  }
  .v-c .section + .section {
    border-top: 1px solid var(--border);
  }
  .v-c .section-header {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; user-select: none;
    padding: 10px 14px 10px;
    color: var(--text);
    transition: background 0.15s;
  }
  .v-c .section-header:hover { background: var(--bg-hover); }
  .v-c .section-icon {
    font-size: 15px; opacity: 0.7; width: 20px; text-align: center;
  }
  .v-c .section-title { font-size: 13px; font-weight: 600; }
  .v-c .section-count {
    font-size: 10px; color: var(--text-muted);
    margin-left: auto; background: var(--bg-hover);
    padding: 1px 7px; border-radius: 8px;
  }
  .v-c .section-chevron {
    transition: transform 0.25s; color: var(--text-muted);
  }
  .v-c .section-chevron.collapsed { transform: rotate(-90deg); }

  .v-c .account-list { padding: 0 14px 4px; display: flex; flex-direction: column; }
  .v-c .account-item {
    display: grid; grid-template-columns: 24px 1fr;
    align-items: center; gap: 10px;
    padding: 7px 0; border-radius: 4px;
    cursor: pointer; transition: all 0.15s;
    color: var(--text-secondary); font-size: 12px;
  }
  .v-c .account-item:hover { color: var(--text); }
  .v-c .account-item.active { color: var(--text); }
  .v-c .account-avatar {
    width: 24px; height: 24px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; flex-shrink: 0;
    color: #fff; opacity: 0.8;
  }
  .v-c .account-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .v-c .account-meta {
    font-size: 10px; color: var(--text-muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .v-c .footer {
    padding: 8px 12px; border-top: 1px solid var(--border);
    display: flex; gap: 6px;
  }
  .v-c .footer button {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 7px 0; border-radius: 6px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 11px;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .v-c .footer button:hover { background: var(--bg-hover); color: var(--text); }

  .hidden { display: none !important; }
</style>
</head>
