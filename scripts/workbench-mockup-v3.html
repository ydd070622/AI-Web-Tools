<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作台 - 跟进中心版</title>
<style>
  :root {
    --bg: #0a0a0f; --bg2: #12121a; --bg3: #1a1a25;
    --border: rgba(255,255,255,0.07); --text: #e4e4e9;
    --text2: rgba(255,255,255,0.45); --text3: rgba(255,255,255,0.25);
    --accent: #6366f1; --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text);
    padding: 20px; display: flex; justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 780px; width: 100%; }

  /* === Top Bar === */
  .topbar {
    display: flex; align-items: center; gap: 16px; margin-bottom: 16px;
  }
  .topbar-title { font-size: 15px; font-weight: 700; }
  .topbar-stats { display: flex; gap: 14px; margin-left: auto; }
  .ts-item { text-align: center; }
  .ts-num { font-size: 18px; font-weight: 800; }
  .ts-num.red { color: #f87171; }
  .ts-num.amber { color: #fbbf24; }
  .ts-num.blue { color: #818cf8; }
  .ts-num.green { color: #4ade80; }
  .ts-label { font-size: 10px; color: var(--text3); margin-top: 1px; }

  /* === Main layout: Follow-up list + right sidebar === */
  .main { }
  .col-main { }

  /* === Date group header === */
  .date-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0 6px;
  }
  .date-badge {
    min-width: 70px; padding: 6px 12px; border-radius: 20px;
    font-size: 14px; font-weight: 700; text-align: center;
  }
  .date-badge.overdue { background: rgba(239,68,68,0.12); color: #f87171; }
  .date-badge.today { background: rgba(245,158,11,0.12); color: #fbbf24; }
  .date-badge.upcoming { background: rgba(99,102,241,0.1); color: #818cf8; }
  .date-divider { flex: 1; height: 1px; background: var(--border); }

  /* === Follow-up card === */
  .fu-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 14px;
    transition: border-color 0.15s;
  }
  .fu-card:hover { border-color: rgba(255,255,255,0.15); }
  .fu-card.urgent { border-left: 3px solid #ef4444; }
  .fu-card.warn { border-left: 3px solid #f59e0b; }

  .fu-date-col {
    display: flex; flex-direction: column; align-items: center;
    min-width: 64px; flex-shrink: 0;
  }
  .fu-date-day {
    font-size: 26px; font-weight: 800; line-height: 1;
  }
  .fu-date-week {
    font-size: 11px; color: var(--text3); margin-top: 3px;
  }
  .fu-date-col.overdue .fu-date-day { color: #f87171; }
  .fu-date-col.today .fu-date-day { color: #fbbf24; }
  .fu-date-col.upcoming .fu-date-day { color: #818cf8; }

  .fu-info { flex: 1; min-width: 0; }
  .fu-info-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .fu-av {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff; font-weight: 700; flex-shrink: 0;
  }
  .fu-name { font-size: 14px; font-weight: 700; }
  .fu-stage-tag {
    font-size: 10px; padding: 1px 7px; border-radius: 8px;
    background: var(--bg3); color: var(--text2);
  }
  .fu-note {
    font-size: 13px; color: var(--text2); line-height: 1.5;
    padding-left: 36px;
  }
  .fu-note.empty { color: var(--text3); font-style: italic; }

  .fu-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .fu-btn {
    padding: 6px 14px; border-radius: 6px; border: none;
    font-size: 12px; cursor: pointer; font-family: inherit;
    font-weight: 600; transition: all 0.15s;
  }
  .fu-btn.done {
    background: rgba(34,197,94,0.12); color: #4ade80;
  }
  .fu-btn.done:hover { background: rgba(34,197,94,0.25); }
  .fu-btn.follow {
    background: var(--bg3); color: var(--text2);
  }
  .fu-btn.follow:hover { background: var(--bg-hover, rgba(255,255,255,0.08)); color: var(--text); }

  /* === Sidebar === */
  .side-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; margin-bottom: 12px;
  }
  .side-card-hd {
    padding: 10px 14px; font-size: 12px; font-weight: 700;
    border-bottom: 1px solid var(--border);
  }
  .side-stat {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; font-size: 12px;
  }
  .side-stat + .side-stat { border-top: 1px solid rgba(255,255,255,0.03); }
  .side-stat-val { font-weight: 700; font-size: 14px; }
  .jump-btn {
    display: flex; align-items: center; gap: 6px;
    width: 100%; padding: 9px 14px; border: none; background: transparent;
    color: var(--text2); font-size: 12px; cursor: pointer;
    font-family: inherit; transition: background 0.1s; text-align: left;
    border-top: 1px solid rgba(255,255,255,0.03);
  }
  .jump-btn:hover { background: var(--bg3); }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--text3);
  }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .empty-text { font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 4px; }
  .empty-hint { font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="main">

    <!-- ===== LEFT: Follow-up List ===== -->
    <div class="col-main">

      <!-- Metric cards row -->
      <div style="display:flex;gap:10px;margin-bottom:14px;">
        <div style="flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;">
          <div style="width:38px;height:38px;border-radius:8px;background:rgba(129,140,248,0.12);display:flex;align-items:center;justify-content:center;font-size:18px;">👥</div>
          <div><div style="font-size:22px;font-weight:800;">9</div><div style="font-size:10px;color:var(--text3);">全部客户</div></div>
        </div>
        <div style="flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;">
          <div style="width:38px;height:38px;border-radius:8px;background:rgba(245,158,11,0.12);display:flex;align-items:center;justify-content:center;font-size:18px;">⏰</div>
          <div><div style="font-size:22px;font-weight:800;color:#fbbf24;">4</div><div style="font-size:10px;color:var(--text3);">待跟进</div></div>
        </div>
        <div style="flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;">
          <div style="width:38px;height:38px;border-radius:8px;background:rgba(34,197,94,0.12);display:flex;align-items:center;justify-content:center;font-size:18px;">✅</div>
          <div><div style="font-size:22px;font-weight:800;color:#4ade80;">2</div><div style="font-size:10px;color:var(--text3);">已成交</div></div>
        </div>
      </div>

      <!-- Overdue group -->
      <div class="date-header">
        <span class="date-badge overdue">已逾期</span>
        <div class="date-divider"></div>
      </div>

      <div class="fu-card urgent">
        <div class="fu-date-col overdue">
          <div class="fu-date-day">19</div>
          <div class="fu-date-week">6月 · 周四</div>
        </div>
        <div class="fu-info">
          <div class="fu-info-top">
            <div class="fu-av" style="background:linear-gradient(135deg,#6366f1,#818cf8)">张</div>
            <span class="fu-name">张女士</span>
            <span class="fu-stage-tag">待跟进</span>
          </div>
          <div class="fu-note">客户说6.19才有空，发了户型图，需等先生一起看方案</div>
        </div>
        <div class="fu-actions">
          <button class="fu-btn done">✓ 完成</button>
          <button class="fu-btn follow">编辑</button>
        </div>
      </div>

      <!-- Today group -->
      <div class="date-header">
        <span class="date-badge today">今天 6/26</span>
        <div class="date-divider"></div>
      </div>

      <div class="fu-card warn">
        <div class="fu-date-col today">
          <div class="fu-date-day">26</div>
          <div class="fu-date-week">6月 · 周四</div>
        </div>
        <div class="fu-info">
          <div class="fu-info-top">
            <div class="fu-av" style="background:linear-gradient(135deg,#ec4899,#f472b6)">吴</div>
            <span class="fu-name">吴女士</span>
            <span class="fu-stage-tag">待跟进</span>
          </div>
          <div class="fu-note">今天联系确认方案，发了方案还没反馈</div>
        </div>
        <div class="fu-actions">
          <button class="fu-btn done">✓ 完成</button>
          <button class="fu-btn follow">编辑</button>
        </div>
      </div>

      <!-- Upcoming group -->
      <div class="date-header">
        <span class="date-badge upcoming">即将跟进</span>
        <div class="date-divider"></div>
      </div>

      <div class="fu-card">
        <div class="fu-date-col upcoming">
          <div class="fu-date-day">29</div>
          <div class="fu-date-week">6月 · 周日</div>
        </div>
        <div class="fu-info">
          <div class="fu-info-top">
            <div class="fu-av" style="background:linear-gradient(135deg,#22c55e,#4ade80)">陈</div>
            <span class="fu-name">陈女士</span>
            <span class="fu-stage-tag">沟通中</span>
          </div>
          <div class="fu-note">6.21出差回来再聊，方案待调整</div>
        </div>
        <div class="fu-actions">
          <button class="fu-btn done">✓ 完成</button>
          <button class="fu-btn follow">编辑</button>
        </div>
      </div>

      <div class="fu-card">
        <div class="fu-date-col upcoming">
          <div class="fu-date-day">01</div>
          <div class="fu-date-week">7月 · 周二</div>
        </div>
        <div class="fu-info">
          <div class="fu-info-top">
            <div class="fu-av" style="background:linear-gradient(135deg,#f59e0b,#fbbf24)">刘</div>
            <span class="fu-name">刘女士</span>
            <span class="fu-stage-tag">已加微信</span>
          </div>
          <div class="fu-note empty">暂无跟进备注</div>
        </div>
        <div class="fu-actions">
          <button class="fu-btn done">✓ 完成</button>
          <button class="fu-btn follow">编辑</button>
        </div>
      </div>

      </div>

    </div>
  </div>
</div>
</div>

</body>
</html>
